<!DOCTYPE html>
<html lang="HU">
<head>
    <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Elfelejtett jelszó</title>
        <link rel="icon" type="image/png" href="../images/dumbbell-icon.png">
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/forgot-pass.css"/>
        <!--!JavaScript-->
        <script type="module" src="../javascript/forgot-pass.js"></script>
</head>
<body>
    <div class="container-fluid forgot-container d-flex align-items-center justify-content-center">
        <div class="card forgot-card shadow">

            <div class="card-header text-center">
                <h2 class="mb-2">Elfelejtett jelszó</h2>
                <p class="text-muted mb-0">
                    Add meg az email címed, és küldünk egy linket az új jelszó beállításához.
                </p>
            </div>

            <div class="card-body">
                <div class="input-group mb-3">
                    <input 
                        type="email" 
                        class="form-control" 
                        placeholder="Email cím" 
                        id="email"
                    >
                    <button class="btn btn-primary" type="button" id="button-send">
                        Küldés
                    </button>
                </div>

                <div id="feedback" class="text-center small"></div>
            </div>

            <div class="card-footer text-center">
                <button onclick="history.back()" class="btn btn-link back-btn">
                    ← Vissza a bejelentkezéshez
                </button>
            </div>

        </div>
    </div>
</body>
</html>
