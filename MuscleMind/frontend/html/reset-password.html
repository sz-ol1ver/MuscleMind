<!DOCTYPE html>
<html lang="HU">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Új jelszó</title>
    <link rel="icon" type="image/png" href="../images/dumbbell-icon.png">
    <!--!Bootstrap-->
    <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
    <!--?Popper: dropdowns, popovers, tooltips-->
    <script src="../bootstrap/js/popper.min.js"></script>
    <script src="../bootstrap/js/bootstrap.min.js"></script>
    <!--!CSS-->
    <link rel="stylesheet" href="../css/reset-pass.css"/>
    <!--!JavaScript-->
    <script type="module" src="../javascript/reset-pass.js"></script>
</head>
<body>
    <div class="container-fluid forgot-container d-flex align-items-center justify-content-center">
        <div class="card forgot-card shadow">

            <div class="card-header text-center">
                <h2 class="mb-2">Új jelszó</h2>
                <p class="text-muted mb-0">
                    Add meg az új jelszavad.
                </p>
            </div>

            <div class="card-body">
                <form id="new-pass" class="needs-validation">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">Új jelszó</label>
                        <input name="newPass" type="password" class="form-control" id="newPassword" placeholder="sigmaLigma123">
                    </div>
                    <div class="mb-3">
                        <label for="newPasswordConf" class="form-label">Jelszó megerősítés</label>
                        <input name="newPassConf" type="password" class="form-control" id="newPasswordConf" placeholder="sigmaLigma123">
                    </div>
                </form>
                <div id="feedback" class="text-center small mb-2"></div>
                <button id="saveNew" class="btn btn-primary d-block mx-auto">
                    Mentés
                </button>
            </div>
            <div class="card-footer text-center">
                <button onclick="window.location.href='/bejelentkezes'" class="btn btn-link back-btn">
                    ← Vissza a bejelentkezéshez
                </button>
                <button onclick="window.location.href='/jelszo-keres'" class="btn btn-link back-btn">
                    Új link kérése
                </button>
            </div>
        </div>
    </div>
</body>
</html>
